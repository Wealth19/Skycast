<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast // Weather Task 05</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome for weather icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <h1 class="header">SkyCast</h1>
      <div class="search-box">
        <input type="text" placeholder="Enter city name..." id="city-input" />
        <button id="search-btn" title="Search">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>

      <div class="weather-card" id="weather-display">
        <div class="loading">Search city...</div>
        <!-- Data will be injected here -->
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
